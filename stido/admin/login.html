<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول لوحة التحكم | أركان استوديو</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body style="padding-top: 0; padding-bottom: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, var(--color-burnt) 0%, var(--color-bg) 100%);">

  <div class="admin-login glass">
    <svg class="admin-login__logo" viewBox="0 0 24 24">
      <path d="M12 2L2 22h20L12 2zm0 3.99L19.53 19H4.47L12 5.99zM13 16h-2v2h2v-2zm0-6h-2v4h2v-4z"/>
    </svg>
    <h1 style="font-size: 1.6rem; font-weight: 800; margin-bottom: 25px;">لوحة تحكم أركان</h1>
    
    <form id="login-form" style="display: flex; flex-direction: column; gap: 20px; text-align: right;">
      <div class="form-group">
        <label for="username">اسم المستخدم</label>
        <input type="text" id="username" required placeholder="مثال: admin">
      </div>

      <div class="form-group">
        <label for="password">كلمة المرور</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>

      <div id="login-error" style="color: #FF4D4D; font-size: 0.85rem; display: none; text-align: center;"></div>

      <button type="submit" class="btn btn--primary" style="justify-content: center; width: 100%; margin-top: 10px;">
        تسجيل الدخول
      </button>
    </form>
    
    <a href="../index.html" style="display: inline-block; margin-top: 20px; font-size: 0.85rem; color: var(--color-text-muted);">
      ← العودة للموقع الرئيسي
    </a>
  </div>

  <script src="../js/admin.js"></script>
</body>
</html>
