<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اتصل بنا | أركان استوديو</title>
  <meta name="description" content="تواصل مع أركان استوديو لحجز موعد تصوير أو استشارة فنية وصوتية. نحن متواجدون لخدمتكم عبر الواتساب والهاتف والبريد الإلكتروني.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body id="contact-page">

  <!-- Top Navigation -->
  <header class="header glass">
    <div class="header__logo" onclick="navigateTo('index.html')">
      <svg viewBox="0 0 24 24">
        <path d="M12 2L2 22h20L12 2zm0 3.99L19.53 19H4.47L12 5.99zM13 16h-2v2h2v-2zm0-6h-2v4h2v-4z"/>
      </svg>
      <span>أركان</span>
    </div>
    
    <div class="header__search">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="text" placeholder="ابحث عن عمل فني...">
    </div>

    <div class="header__actions">
      <div class="icon-btn" onclick="alert('لا توجد إشعارات جديدة حالياً.')">
        <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        <span class="badge"></span>
      </div>
      <button class="btn-admin" onclick="navigateTo('admin/login.html')">
        <svg viewBox="0 0 24 24" style="width:16px; height:16px; fill:currentColor;"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        الإدارة
      </button>
    </div>
  </header>

  <!-- Contact Section -->
  <section class="contact">
    <div class="section-header">
      <span class="section-header__subtitle">تواصل معنا</span>
      <h1 class="section-header__title">يسعدنا دائماً سماع صوتك</h1>
    </div>

    <div class="contact__container">
      <!-- Quick Contact Info -->
      <div class="contact__info">
        <div class="contact-item">
          <div class="contact-item__icon">
            <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
          </div>
          <div>
            <h3 class="contact-item__title">الاتصال المباشر</h3>
            <p class="contact-item__value" id="contact-phone">+966 50 000 0000</p>
          </div>
        </div>

        <div class="contact-item">
          <div class="contact-item__icon">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
          </div>
          <div>
            <h3 class="contact-item__title">البريد الإلكتروني</h3>
            <p class="contact-item__value" id="contact-email">info@arkan.sa</p>
          </div>
        </div>

        <div class="contact-item">
          <div class="contact-item__icon">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
          </div>
          <div>
            <h3 class="contact-item__title">الموقع الجغرافي</h3>
            <p class="contact-item__value" id="contact-address">الرياض، المملكة العربية السعودية</p>
          </div>
        </div>

        <!-- Google Maps Embed -->
        <div style="border-radius: 16px; overflow: hidden; border: 1px solid var(--color-border); height: 200px;">
          <iframe id="contact-map" src="" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
      </div>

      <!-- Contact Form -->
      <form class="contact__form" id="contact-form">
        <h3 style="font-size: 1.4rem; font-weight: 800; color: var(--color-primary); margin-bottom: 10px;">أرسل لنا رسالة مباشرة</h3>
        
        <div class="form-group">
          <label for="form-name">الاسم الكامل</label>
          <input type="text" id="form-name" required placeholder="أدخل اسمك الكريم">
        </div>

        <div class="form-group">
          <label for="form-message">تفاصيل الاستفسار أو الحجز</label>
          <textarea id="form-message" rows="5" required placeholder="كيف يمكننا مساعدتك؟ يرجى تحديد نوع الخدمة المطلوبة..."></textarea>
        </div>

        <button type="submit" class="btn btn--primary" style="justify-content: center; width: 100%;">
          إرسال عبر البريد الإلكتروني
          <svg viewBox="0 0 24 24" style="width:20px; height:20px; fill:currentColor;"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>

        <a href="https://wa.me/966500000000" target="_blank" class="btn btn--secondary" style="justify-content: center; width: 100%; border-color: #25D366; color: #25D366; background: rgba(37, 211, 102, 0.05);">
          تواصل سريع عبر الواتساب
          <svg viewBox="0 0 24 24" style="width:20px; height:20px; fill:currentColor;"><path d="M20.52 3.44C18.24 1.15 15.21 0 12 0 5.46 0 .14 5.31.14 11.84c0 2.09.55 4.12 1.59 5.92L0 24l6.33-1.66c1.73.94 3.67 1.44 5.66 1.44 6.54 0 11.86-5.31 11.86-11.84 0-3.16-1.23-6.13-3.52-8.41zM12 21.75c-1.77 0-3.5-.48-5.01-1.37l-.36-.21-3.73.98.99-3.64-.23-.37c-.98-1.56-1.5-3.37-1.5-5.24 0-5.49 4.47-9.95 9.96-9.95 2.66 0 5.16 1.04 7.04 2.92 1.88 1.88 2.92 4.38 2.92 7.04 0 5.49-4.47 9.95-9.96 9.95zm5.46-7.46c-.3-.15-1.77-.87-2.04-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07-.3-.15-1.27-.47-2.42-1.49-.89-.8-1.49-1.78-1.67-2.08-.17-.3-.02-.46.13-.61.14-.13.3-.35.45-.53.15-.17.2-.3.3-.5.1-.2.05-.38-.02-.53-.07-.15-.67-1.62-.92-2.22-.24-.59-.49-.51-.67-.52-.17-.01-.37-.01-.57-.01-.2 0-.52.07-.79.37-.27.3-1.04 1.02-1.04 2.48 0 1.46 1.06 2.87 1.21 3.07.15.2 2.09 3.2 5.07 4.49.71.3 1.26.49 1.69.63.71.22 1.36.19 1.87.12.57-.08 1.77-.72 2.02-1.42.25-.7.25-1.3.17-1.42-.07-.13-.27-.2-.57-.35z"/></svg>
        </a>
      </form>
    </div>
  </section>

  <!-- App Bottom Navigation -->
  <nav class="bottom-nav glass">
    <div class="bottom-nav__item" onclick="navigateTo('index.html')">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      الرئيسية
    </div>
    <div class="bottom-nav__item" onclick="navigateTo('portfolio.html')">
      <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
      الأعمال
    </div>
    <div class="bottom-nav__item" onclick="navigateTo('audio.html')">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 14H11V7h2v9z"/></svg>
      الصوتيات
    </div>
    <div class="bottom-nav__item" onclick="navigateTo('services.html')">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
      الخدمات
    </div>
    <div class="bottom-nav__item active" onclick="navigateTo('about.html')">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      المزيد
    </div>
  </nav>

  <script src="js/app.js"></script>
</body>
</html>
